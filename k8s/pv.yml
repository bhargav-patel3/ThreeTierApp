apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongo-volume
  namespace: three-tier
spec:
  capacity:
    storage: 1 Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Recycle
  storageClassName: slow
  mountOptions:
    - hard
    - nfsvers=4.1
  nfs:
    path: /tmp
    server: 172.17.0.2
